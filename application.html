<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать заявку - Коробки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container">
            <div class="logo-container">
                <img src="icon.png" alt="Logo" class="logo-icon">
                <a class="navbar-brand" href="#">Корочки.есть</a>
            </div>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Мои заявки</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="create-request.html">Создать заявку</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Выйти</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0">Формирование заявки на обучение</h4>
                    </div>
                    <div class="card-body">
                        <form id="requestForm">
                            <div class="mb-3">
                                <label for="courseName" class="form-label">Наименование курса *</label>
                                <input type="text" class="form-control" id="courseName" name="courseName" required>
                                <div class="form-text">Введите полное название курса</div>
                            </div>

                            <div class="mb-3">
                                <label for="startDate" class="form-label">Желаемая дата начала обучения *</label>
                                <input type="date" class="form-control" id="startDate" name="startDate" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Способ оплаты *</label>
                                <div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="paymentMethod" 
                                               id="paymentCash" value="cash" required>
                                        <label class="form-check-label" for="paymentCash">
                                            Наличными
                                        </label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="paymentMethod" 
                                               id="paymentTransfer" value="transfer" required>
                                        <label class="form-check-label" for="paymentTransfer">
                                            Переводом по номеру телефона
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-3" id="phoneTransferField" style="display: none;">
                                <label for="phoneForTransfer" class="form-label">Номер телефона для перевода</label>
                                <input type="tel" class="form-control" id="phoneForTransfer" 
                                       placeholder="8(XXX)XXX-XX-XX">
                            </div>

                            <div class="alert alert-info">
                                <strong>Важно!</strong> После отправки заявка получит статус "Новая". 
                                Администратор рассмотрит её в ближайшее время.
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="dashboard.html" class="btn btn-secondary">Отмена</a>
                                <button type="submit" class="btn btn-success">Отправить заявку</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
</body>
</html>
