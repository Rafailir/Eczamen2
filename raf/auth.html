<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Коробки.есть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container">
            <div class="logo-container">
                <img src="icon.png" alt="Logo" class="logo-icon">
                <a class="navbar-brand" href="#">Корочки.есть</a>
            </div>
            <div class="navbar-nav">
                <a class="nav-link active" href="auth.html">Вход</a>
                <a class="nav-link" href="index.html">Регистрация</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header bg-secondary text-white">
                        <h4 class="mb-0">Вход в систему</h4>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="login" class="form-label">Логин</label>
                                <input type="text" class="form-control" id="login" name="login" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Пароль</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Запомнить меня</label>
+                            <div id="errorMsg" class="alert alert-danger d-none"></div>

                            <div class="d-grid gap-2">
                                <a href="dashboard.html" class="btn btn-secondary">Войти</a>
                            </div>
                            <p></p>
                             <div class="d-grid gap-2">
                                <a href="admin.html" class="btn btn-secondary">Войти как администратор</a>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center">
                        <small>Еще не зарегистрированы? <a href="index.html">Регистрация</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    
</body>
</html>
